<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Tech Fault RAG Bot Architecture</title>
  <desc id="desc">Clean architecture diagram showing the runtime RAG flow and offline PDF ingestion flow for the Tech Fault RAG Bot.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 18px Arial, sans-serif; fill: #475569; }
      .section { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .section-title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .box { stroke-width: 2.5; rx: 12; }
      .ui { fill: #ecfeff; stroke: #0891b2; }
      .api { fill: #eff6ff; stroke: #2563eb; }
      .store { fill: #f0fdf4; stroke: #16a34a; }
      .external { fill: #fff7ed; stroke: #ea580c; }
      .ingest { fill: #fdf2f8; stroke: #db2777; }
      .box-title { font: 700 19px Arial, sans-serif; fill: #0f172a; }
      .box-subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .line { fill: none; stroke: #334155; stroke-width: 2.8; marker-end: url(#arrow); }
      .soft-line { fill: none; stroke: #64748b; stroke-width: 2.6; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .label { font: 14px Arial, sans-serif; fill: #334155; }
      .pill { fill: #e2e8f0; }
      .pill-text { font: 700 13px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="canvas" width="1280" height="760"/>
  <text class="title" x="56" y="56">Tech Fault RAG Bot Architecture</text>
  <text class="subtitle" x="56" y="88">Runtime question answering flow with a separate offline ingestion pipeline for technical manuals.</text>

  <rect class="section" x="48" y="124" width="1184" height="390"/>
  <text class="section-title" x="76" y="166">Runtime RAG flow</text>
  <rect class="pill" x="1070" y="142" width="106" height="28" rx="14"/>
  <text class="pill-text" x="1123" y="161" text-anchor="middle">online</text>

  <rect class="box ui" x="92" y="244" width="176" height="78"/>
  <text class="box-title" x="180" y="276" text-anchor="middle">React + Vite</text>
  <text class="box-subtitle" x="180" y="300" text-anchor="middle">browser UI</text>

  <rect class="box api" x="342" y="186" width="190" height="74"/>
  <text class="box-title" x="437" y="216" text-anchor="middle">FastAPI routes</text>
  <text class="box-subtitle" x="437" y="239" text-anchor="middle">auth, chats, ask</text>

  <rect class="box api" x="342" y="328" width="190" height="74"/>
  <text class="box-title" x="437" y="358" text-anchor="middle">QA service</text>
  <text class="box-subtitle" x="437" y="381" text-anchor="middle">prompt + citations</text>

  <rect class="box api" x="606" y="328" width="190" height="74"/>
  <text class="box-title" x="701" y="358" text-anchor="middle">Retrieval</text>
  <text class="box-subtitle" x="701" y="381" text-anchor="middle">embed query + search</text>

  <rect class="box external" x="870" y="188" width="178" height="74"/>
  <text class="box-title" x="959" y="218" text-anchor="middle">OpenAI</text>
  <text class="box-subtitle" x="959" y="241" text-anchor="middle">Responses API</text>

  <rect class="box external" x="870" y="328" width="178" height="74"/>
  <text class="box-title" x="959" y="358" text-anchor="middle">OpenAI</text>
  <text class="box-subtitle" x="959" y="381" text-anchor="middle">Embeddings API</text>

  <rect class="box store" x="1078" y="210" width="118" height="74"/>
  <text class="box-title" x="1137" y="240" text-anchor="middle">SQLite</text>
  <text class="box-subtitle" x="1137" y="263" text-anchor="middle">auth + chats</text>

  <rect class="box store" x="1078" y="350" width="118" height="74"/>
  <text class="box-title" x="1137" y="380" text-anchor="middle">ChromaDB</text>
  <text class="box-subtitle" x="1137" y="403" text-anchor="middle">vectors</text>

  <path class="line" d="M268 283 H342"/>
  <text class="label" x="288" y="266">API requests</text>

  <path class="line" d="M437 260 V328"/>
  <text class="label" x="454" y="301">questions</text>

  <path class="line" d="M532 365 H606"/>
  <text class="label" x="548" y="348">retrieve context</text>

  <path class="line" d="M796 365 H870"/>
  <text class="label" x="808" y="348">embed query</text>

  <path class="line" d="M1048 365 H1078"/>
  <text class="label" x="1038" y="348">search</text>

  <path class="line" d="M701 328 C715 228 786 225 870 225"/>
  <text class="label" x="720" y="244">context + prompt</text>

  <path class="line" d="M870 225 C760 258 640 316 532 365"/>
  <text class="label" x="636" y="290">answer + citations</text>

  <path class="line" d="M342 223 C302 223 284 247 268 283"/>
  <text class="label" x="278" y="218">responses</text>

  <path class="line" d="M532 223 H1078"/>
  <text class="label" x="614" y="206">signup, login, conversations, messages</text>

  <rect class="section" x="48" y="558" width="1184" height="142"/>
  <text class="section-title" x="76" y="610">Offline ingestion flow</text>
  <rect class="pill" x="1070" y="586" width="106" height="28" rx="14"/>
  <text class="pill-text" x="1123" y="605" text-anchor="middle">offline</text>

  <rect class="box store" x="278" y="600" width="150" height="68"/>
  <text class="box-title" x="353" y="628" text-anchor="middle">PDF manuals</text>
  <text class="box-subtitle" x="353" y="650" text-anchor="middle">data/raw_docs</text>

  <rect class="box ingest" x="498" y="600" width="150" height="68"/>
  <text class="box-title" x="573" y="628" text-anchor="middle">PDF loader</text>
  <text class="box-subtitle" x="573" y="650" text-anchor="middle">extract pages</text>

  <rect class="box ingest" x="718" y="600" width="150" height="68"/>
  <text class="box-title" x="793" y="628" text-anchor="middle">Chunker</text>
  <text class="box-subtitle" x="793" y="650" text-anchor="middle">split text</text>

  <rect class="box ingest" x="938" y="600" width="150" height="68"/>
  <text class="box-title" x="1013" y="628" text-anchor="middle">Embedder</text>
  <text class="box-subtitle" x="1013" y="650" text-anchor="middle">chunk vectors</text>

  <path class="soft-line" d="M428 634 H498"/>
  <path class="soft-line" d="M648 634 H718"/>
  <path class="soft-line" d="M868 634 H938"/>
  <path class="soft-line" d="M1013 600 C1013 520 1048 424 1078 387"/>
  <text class="label" x="1050" y="536">write chunks</text>
  <path class="soft-line" d="M1013 600 C1013 526 975 470 959 402"/>
  <text class="label" x="894" y="536">embed chunks</text>
</svg>
