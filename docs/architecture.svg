<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">Tech Fault RAG Bot Architecture</title>
  <desc id="desc">Architecture diagram showing the React frontend, FastAPI backend, local storage, OpenAI APIs, and offline PDF ingestion pipeline.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .canvas { fill: #f8fafc; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .group-title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .node { stroke-width: 2; rx: 12; }
      .frontend { fill: #ecfeff; stroke: #0891b2; }
      .backend { fill: #eff6ff; stroke: #2563eb; }
      .storage { fill: #f0fdf4; stroke: #16a34a; }
      .external { fill: #fff7ed; stroke: #ea580c; }
      .ingestion { fill: #fdf2f8; stroke: #db2777; }
      .node-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .node-subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .label { font: 14px Arial, sans-serif; fill: #334155; }
      .line { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .badge { fill: #e2e8f0; }
      .badge-text { font: 700 13px Arial, sans-serif; fill: #334155; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="canvas" width="1280" height="780"/>
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Tech Fault RAG Bot Architecture</text>
  <text x="48" y="82" font-family="Arial, sans-serif" font-size="16" fill="#475569">Runtime question answering flow plus offline document ingestion into the vector store.</text>

  <rect class="group" x="42" y="126" width="230" height="250"/>
  <text class="group-title" x="66" y="162">User interface</text>
  <rect class="node frontend" x="76" y="196" width="162" height="62"/>
  <text class="node-title" x="157" y="222" text-anchor="middle">Browser</text>
  <text class="node-subtitle" x="157" y="245" text-anchor="middle">end user</text>
  <rect class="node frontend" x="76" y="286" width="162" height="62"/>
  <text class="node-title" x="157" y="312" text-anchor="middle">React + Vite</text>
  <text class="node-subtitle" x="157" y="335" text-anchor="middle">frontend</text>

  <rect class="group" x="342" y="126" width="306" height="460"/>
  <text class="group-title" x="366" y="162">FastAPI backend</text>
  <rect class="node backend" x="386" y="196" width="218" height="62"/>
  <text class="node-title" x="495" y="222" text-anchor="middle">app/main.py</text>
  <text class="node-subtitle" x="495" y="245" text-anchor="middle">API routes + CORS</text>
  <rect class="node backend" x="386" y="286" width="218" height="62"/>
  <text class="node-title" x="495" y="312" text-anchor="middle">Auth service</text>
  <text class="node-subtitle" x="495" y="335" text-anchor="middle">signup, login, tokens</text>
  <rect class="node backend" x="386" y="376" width="218" height="62"/>
  <text class="node-title" x="495" y="402" text-anchor="middle">History service</text>
  <text class="node-subtitle" x="495" y="425" text-anchor="middle">conversations + messages</text>
  <rect class="node backend" x="386" y="466" width="218" height="62"/>
  <text class="node-title" x="495" y="492" text-anchor="middle">QA service</text>
  <text class="node-subtitle" x="495" y="515" text-anchor="middle">prompt + citations</text>

  <rect class="group" x="722" y="126" width="234" height="460"/>
  <text class="group-title" x="746" y="162">Retrieval + storage</text>
  <rect class="node backend" x="758" y="196" width="162" height="62"/>
  <text class="node-title" x="839" y="222" text-anchor="middle">Search</text>
  <text class="node-subtitle" x="839" y="245" text-anchor="middle">embed query</text>
  <rect class="node storage" x="758" y="376" width="162" height="62"/>
  <text class="node-title" x="839" y="402" text-anchor="middle">SQLite</text>
  <text class="node-subtitle" x="839" y="425" text-anchor="middle">auth + chat history</text>
  <rect class="node storage" x="758" y="466" width="162" height="62"/>
  <text class="node-title" x="839" y="492" text-anchor="middle">ChromaDB</text>
  <text class="node-subtitle" x="839" y="515" text-anchor="middle">vector store</text>

  <rect class="group" x="1012" y="126" width="226" height="250"/>
  <text class="group-title" x="1036" y="162">External APIs</text>
  <rect class="node external" x="1044" y="196" width="162" height="62"/>
  <text class="node-title" x="1125" y="222" text-anchor="middle">OpenAI</text>
  <text class="node-subtitle" x="1125" y="245" text-anchor="middle">embeddings</text>
  <rect class="node external" x="1044" y="286" width="162" height="62"/>
  <text class="node-title" x="1125" y="312" text-anchor="middle">OpenAI</text>
  <text class="node-subtitle" x="1125" y="335" text-anchor="middle">Responses API</text>

  <rect class="group" x="42" y="626" width="1196" height="110"/>
  <text class="group-title" x="66" y="662">Offline ingestion</text>
  <rect class="node storage" x="246" y="648" width="150" height="62"/>
  <text class="node-title" x="321" y="674" text-anchor="middle">PDF manuals</text>
  <text class="node-subtitle" x="321" y="697" text-anchor="middle">data/raw_docs</text>
  <rect class="node ingestion" x="444" y="648" width="150" height="62"/>
  <text class="node-title" x="519" y="674" text-anchor="middle">PDF loader</text>
  <text class="node-subtitle" x="519" y="697" text-anchor="middle">pages</text>
  <rect class="node ingestion" x="642" y="648" width="150" height="62"/>
  <text class="node-title" x="717" y="674" text-anchor="middle">Chunker</text>
  <text class="node-subtitle" x="717" y="697" text-anchor="middle">text chunks</text>
  <rect class="node ingestion" x="840" y="648" width="150" height="62"/>
  <text class="node-title" x="915" y="674" text-anchor="middle">Embedder</text>
  <text class="node-subtitle" x="915" y="697" text-anchor="middle">chunk vectors</text>

  <path class="line" d="M157 258 L157 286"/>
  <path class="line" d="M238 317 C285 317 327 227 386 227"/>
  <text class="label" x="268" y="280">HTTPS API calls</text>

  <path class="line" d="M495 258 L495 286"/>
  <path class="line" d="M495 258 L495 376"/>
  <path class="line" d="M495 258 C620 258 640 497 386 497"/>
  <path class="line" d="M604 497 C654 497 690 227 758 227"/>
  <text class="label" x="615" y="374">retrieve top chunks</text>

  <path class="line" d="M920 227 C978 227 986 227 1044 227"/>
  <text class="label" x="946" y="210">query embedding</text>
  <path class="line" d="M839 258 C950 326 950 418 839 466"/>
  <text class="label" x="856" y="365">vector search</text>
  <path class="line" d="M920 497 C982 497 982 317 1044 317"/>
  <text class="label" x="943" y="418">context + prompt</text>
  <path class="line" d="M1044 317 C934 390 728 497 604 497"/>
  <text class="label" x="782" y="438">answer + citations</text>
  <path class="line" d="M386 497 C320 497 276 317 238 317"/>
  <text class="label" x="268" y="455">response</text>

  <path class="line" d="M604 317 C668 317 700 407 758 407"/>
  <text class="label" x="626" y="365">auth/chat persisted locally</text>
  <path class="line" d="M604 407 L758 407"/>

  <path class="line-soft" d="M396 679 L444 679"/>
  <path class="line-soft" d="M594 679 L642 679"/>
  <path class="line-soft" d="M792 679 L840 679"/>
  <path class="line-soft" d="M990 679 C1035 679 1054 257 1125 258"/>
  <text class="label" x="1015" y="640">embed chunks</text>
  <path class="line-soft" d="M915 648 C915 592 875 555 839 528"/>
  <text class="label" x="920" y="594">store chunks</text>

  <rect class="badge" x="48" y="704" width="92" height="24" rx="12"/>
  <text class="badge-text" x="94" y="721" text-anchor="middle">offline</text>
  <rect class="badge" x="48" y="96" width="92" height="24" rx="12"/>
  <text class="badge-text" x="94" y="113" text-anchor="middle">runtime</text>
</svg>
